<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <title>My Files - FileWay</title>

    <style>
        .files-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #f3f4f6;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .user-info__avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
        }

        .user-info__details {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .user-info__email {
            color: #f3f4f6;
            font-weight: 600;
        }

        .user-info__role {
            font-size: 0.9rem;
            color: #9ca3af;
        }

        .user-info__role.premium {
            color: #c4b5fd;
            font-weight: 600;
        }

        .files-section {
            margin-top: 3rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-header h2 {
            font-size: 1.5rem;
            color: #f3f4f6;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.2rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #d1d5db;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
        }

        .empty-state__icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            color: #f3f4f6;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #9ca3af;
            margin-bottom: 1.5rem;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1.5rem;
            transition: 0.2s ease;
        }

        .file-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .file-card__header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .file-card__icon {
            font-size: 2rem;
        }

        .file-card__title {
            flex: 1;
            overflow: hidden;
        }

        .file-card__name {
            color: #f3f4f6;
            font-weight: 600;
            word-break: break-word;
            margin-bottom: 0.3rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .file-card__size {
            color: #9ca3af;
            font-size: 0.85rem;
        }

        .file-card__info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 1rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .file-card__info-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .file-card__info-label {
            color: #9ca3af;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .file-card__info-value {
            color: #f3f4f6;
            font-weight: 600;
        }

        .file-card__info-value.expired {
            color: #fca5a5;
        }

        .file-card__info-value.active {
            color: #86efac;
        }

        .file-card__link {
            margin-top: 1rem;
            padding-top: 1rem;
        }

        .file-card__link-label {
            color: #9ca3af;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 0.5rem;
        }

        .link-input-group {
            display: flex;
            gap: 0.5rem;
        }

        .link-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.6rem;
            color: #d1d5db;
            font-size: 0.85rem;
            word-break: break-all;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .link-input:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .copy-btn {
            padding: 0.6rem 1rem;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #1d4ed8;
        }

        .copy-btn.copied {
            background: #16a34a;
        }

        .open-modal-btn {
            padding: 0.6rem 1rem;
            background: #8b5cf6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
            white-space: nowrap;
        }

        .open-modal-btn:hover {
            background: #7c3aed;
        }

        @media (max-width: 768px) {
            .files-grid {
                grid-template-columns: 1fr;
            }

            .file-card__info {
                grid-template-columns: 1fr;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .page-header h1 {
                font-size: 1.8rem;
            }
        }

        /*css for model*/

        .modal-overlay {
            background: rgba(0, 0, 0, 0.7);
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-wrapper {
            width: 90%;
            max-width: 600px;
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            background: #1f2937;
        }

        .modal-header h2 {
            color: #f3f4f6;
            margin: 0;
            font-size: 1.3rem;
        }

        .close-modal-btn {
            background: transparent;
            border: none;
            color: #9ca3af;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .close-modal-btn:hover {
            color: #f3f4f6;
        }

        .modal-content {
            padding: 1.5rem;
        }

        .links-list {
            margin-bottom: 2rem;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .link-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .link-item-url {
            flex: 1;
            color: #93c5fd;
            font-size: 0.85rem;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .link-item-status {
            display: inline-block;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 1rem;
        }

        .link-item-status.active {
            background: rgba(134, 239, 172, 0.2);
            color: #86efac;
        }

        .link-item-status.expired {
            background: rgba(252, 165, 165, 0.2);
            color: #fca5a5;
        }

        .link-item-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
            color: #d1d5db;
        }

        .link-item-detail {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .link-item-detail-label {
            color: #9ca3af;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .link-item-detail-value {
            color: #f3f4f6;
            font-weight: 600;
        }

        .link-item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .link-copy-btn,
        .link-delete-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }

        .link-copy-btn {
            background: #2563eb;
            color: white;
        }

        .link-copy-btn:hover {
            background: #1d4ed8;
        }

        .link-copy-btn.copied {
            background: #16a34a;
        }

        .link-delete-btn {
            background: #ef4444;
            color: white;
        }

        .link-delete-btn:hover {
            background: #dc2626;
        }

        .empty-links {
            text-align: center;
            padding: 2rem 1rem;
            color: #9ca3af;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .create-link-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 1.5rem;
        }

        .create-link-section h3 {
            color: #f3f4f6;
            margin: 0 0 1rem 0;
            font-size: 1.1rem;
        }

        .create-link-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .create-link-form label {
            color: #d1d5db;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .create-link-form input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 0.6rem;
            color: #f3f4f6;
            font-size: 0.9rem;
        }

        .create-link-form input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .create-link-submit-btn {
            grid-column: 1 / -1;
            background: #10b981;
            color: white;
            border: none;
            padding: 0.7rem 1rem;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .create-link-submit-btn:hover {
            background: #059669;
        }

        .hide {
            display: none !important;
        }

    </style>
</head>
<body>
<header class="topbar">
    <div class="brand">
        <div class="brand__logo">F</div>
        <div>
            <div class="brand__name">Fileway</div>
            <div class="brand__tagline">Secure file sharing made simple</div>
        </div>
    </div>

    <nav class="topbar__nav">
        <a href="/">Upload</a>
        <a href="/my-files">My Files</a>
        <form th:action="@{/logout}" method="post">
            <a><button type="submit">Logout</button></a>
        </form>
        <span th:if="${isPremium}" class="user-status premium">Premium - <span th:text="${user.email}"></span></span>
        <span th:unless="${isPremium}" class="user-status">User - <span th:text="${user.email}"></span></span>
    </nav>
</header>

<div class="files-container">
    <div class="page-header">
        <h1>My Files</h1>
        <div class="user-info">
            <div class="user-info__avatar" th:text="${user.email.charAt(0)}"></div>
            <div class="user-info__details">
                <div class="user-info__email" th:text="${user.email}"></div>
                <div class="user-info__role" th:classappend="${isPremium} ? ' premium' : ''">
                    <span th:if="${isPremium}">Premium Member</span>
                    <span th:unless="${isPremium}">Free Member</span>
                </div>
            </div>
        </div>
    </div>

    <div class="files-section">
        <div class="section-header">
            <h2>Your Uploads</h2>
            <a href="/" class="back-btn">← Back to Upload</a>
        </div>

        <div th:if="${#lists.isEmpty(user.userFiles)}" class="empty-state">
            <div class="empty-state__icon">📁</div>
            <h3>No files yet</h3>
            <p>Start uploading files to see them here</p>
            <a href="/" class="btn btn--primary">Upload Your First File</a>
        </div>

        <div th:unless="${#lists.isEmpty(user.userFiles)}" class="files-grid">
            <div th:each="file : ${user.userFiles}" class="file-card">
                <div class="file-card__header">
                    <div class="file-card__icon">📄</div>
                    <div class="file-card__title">
                        <div class="file-card__name" th:text="${file.originalName}"></div>
                        <div class="file-card__size" th:text="${FileSizeFormatter.format(file.size)}"></div>
                    </div>
                </div>

                <div class="file-card__info">
                    <div class="file-card__info-item">
                        <span class="file-card__info-label">Uploaded</span>
                        <span class="file-card__info-value"
                              th:text="${#temporals.format(file.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                    </div>
<!--                    <div class="file-card__info-item">-->
<!--                        <span class="file-card__info-label">Status</span>-->
<!--                        <span class="file-card__info-value"-->
<!--                              th:classappend="${file.link.expiresAt > T(java.time.LocalDateTime).now()} ? 'active' : 'expired'"-->
<!--                              th:text="${file.link.expiresAt > T(java.time.LocalDateTime).now()} ? 'Active' : 'Expired'"></span>-->
<!--                    </div>-->
<!--                    <div class="file-card__info-item">-->
<!--                        <span class="file-card__info-label">Expires</span>-->
<!--                        <span class="file-card__info-value" th:text="${#temporals.format(file, 'dd.MM.yyyy HH:mm')}"></span>-->
<!--                    </div>-->
<!--                    <div class="file-card__info-item">-->
<!--                        <span class="file-card__info-label">Downloads count</span>-->
<!--                        <span class="file-card__info-value" th:text="${file.link.useCount}"></span>-->
<!--                    </div>-->
                </div>
                <div>
                    <button class="open-modal-btn" th:data-file-id="${file.id}">
                        Manage Links
                    </button>
                </div>
<!--                <div class="file-card__link">-->
<!--                    <label class="file-card__link-label">Share Link</label>-->
<!--                    <div class="link-input-group">-->
<!--                        <input type="text" class="link-input" th:value="${'http://localhost:8080/download-stream/' + file.link.id}" readonly onclick="this.select()" />-->
<!--                        <button class="copy-btn" -->
<!--                                th:data-link="${'http://localhost:8080/download-stream/' + file.link.id}"-->
<!--                                onclick="copyToClipboard(this)">Copy</button>-->
<!--                    </div>-->
<!--                </div>-->
                <div class="file-card__link">
                    <label class="file-card__link-label">File SHA-256 Hash</label>
                    <div class="link-input-group">
                        <input type="text" class="link-input" th:value="${file.fileHash}" readonly onclick="this.select()" />
                        <button class="copy-btn"
                                th:data-link="${file.fileHash}"
                                onclick="copyToClipboard(this)">Copy</button>
                    </div>
                </div>
                <div class="modal-overlay hide" data-file-id="">
                    <div class="modal-wrapper">
                        <div class="modal-header">
                            <h2>Manage Share Links</h2>
                            <button class="close-modal-btn">✕</button>
                        </div>
                        <div class="modal-content">
                            <div class="links-list">
                                <!-- Links will be loaded here -->
                            </div>
                            <div class="create-link-section">
                                <h3>Create New Link</h3>
                                <form class="create-link-form">

                                        <label for="maxUses">Max Uses</label>
                                        <input type="number" id="maxUses" name="maxUses" value="1" min="1" max="100">
                                    </div>
                                    <div class="form-group">
                                        <label for="expirationHours">Expiration (hours)</label>
                                        <input type="number" id="expirationHours" name="expirationHours" value="1" min="1" max="720">
                                    </div>
                                    <button type="button" class="create-link-submit-btn">Create Link</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Get CSRF token from meta tag
    function getCsrfToken() {
        const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
        const header = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
        return { token, header: header || 'X-CSRF-TOKEN' };
    }

    function copyToClipboard(btn) {
        const link = btn.getAttribute('data-link');
        navigator.clipboard.writeText(link).then(() => {
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('copied');
            }, 2000);
        }).catch(() => {
            alert('Failed to copy link');
        });
    }

    // Modal Management for Links
    let currentFileId = null;
    let currentModal = null;

    function openLinkModal(fileId, button) {
        currentFileId = fileId;
        // Find the modal within the same file-card
        currentModal = button.closest('.file-card').querySelector('.modal-overlay');
        currentModal.classList.remove('hide');
        loadLinks(fileId);
    }

    function closeLinkModal() {
        if (currentModal) {
            currentModal.classList.add('hide');
        }
        currentFileId = null;
        currentModal = null;
    }

    async function loadLinks(fileId) {
        try {
            const response = await fetch(`/api/files/${fileId}/links`);
            if (!response.ok) {
                throw new Error('Failed to load links');
            }
            const links = await response.json();
            renderLinks(links);
        } catch (error) {
            console.error('Error loading links:', error);
            alert('Error loading links: ' + error.message);
        }
    }

    function renderLinks(links) {
        if (!currentModal) return;
        
        const linksList = currentModal.querySelector('.links-list');
        
        if (links.length === 0) {
            linksList.innerHTML = '<div class="empty-links">No share links created yet</div>';
            return;
        }

        linksList.innerHTML = links.map(link => `
            <div class="link-item">
                <div class="link-item-header">
                    <span class="link-item-url">${link.url}</span>
                    <span class="link-item-status ${link.isExpired ? 'expired' : 'active'}">
                        ${link.isExpired ? 'Expired' : 'Active'}
                    </span>
                </div>
                <div class="link-item-details">
                    <div class="link-item-detail">
                        <span class="link-item-detail-label">Created</span>
                        <span class="link-item-detail-value">${new Date(link.createdAt).toLocaleString()}</span>
                    </div>
                    <div class="link-item-detail">
                        <span class="link-item-detail-label">Expires</span>
                        <span class="link-item-detail-value">${new Date(link.expiresAt).toLocaleString()}</span>
                    </div>
                    <div class="link-item-detail">
                        <span class="link-item-detail-label">Max Uses</span>
                        <span class="link-item-detail-value">${link.maxUses}</span>
                    </div>
                    <div class="link-item-detail">
                        <span class="link-item-detail-label">Downloads</span>
                        <span class="link-item-detail-value">${link.useCount}/${link.maxUses}</span>
                    </div>
                </div>
                <div class="link-item-actions">
                    <button class="link-copy-btn" onclick="copyLinkToClipboard(this, '${link.url}')">
                        Copy Link
                    </button>
                    <button class="link-delete-btn" onclick="deleteLink('${link.id}')">
                        Delete
                    </button>
                </div>
            </div>
        `).join('');
    }

    function copyLinkToClipboard(btn, link) {
        navigator.clipboard.writeText(link).then(() => {
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('copied');
            }, 2000);
        });
    }

    async function deleteLink(linkId) {
        if (!confirm('Are you sure you want to delete this link?')) {
            return;
        }

        try {
            const csrf = getCsrfToken();
            const response = await fetch(`/api/files/${currentFileId}/links/${linkId}`, {
                method: 'DELETE',
                headers: {
                    [csrf.header]: csrf.token,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                loadLinks(currentFileId);
            } else {
                alert('Error deleting link: ' + response.status);
            }
        } catch (error) {
            console.error('Error deleting link:', error);
            alert('Error deleting link: ' + error.message);
        }
    }

    async function createNewLink() {
        if (!currentModal) return;
        
        const maxUses = currentModal.querySelector('#maxUses').value;
        const expirationHours = currentModal.querySelector('#expirationHours').value;

        try {
            const csrf = getCsrfToken();
            const response = await fetch(`/api/files/${currentFileId}/links?maxUses=${maxUses}&expirationHours=${expirationHours}`, {
                method: 'POST',
                headers: {
                    [csrf.header]: csrf.token,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                currentModal.querySelector('#maxUses').value = '1';
                currentModal.querySelector('#expirationHours').value = '1';
                loadLinks(currentFileId);
            } else {
                alert('Error creating link: ' + response.status);
            }
        } catch (error) {
            console.error('Error creating link:', error);
            alert('Error creating link: ' + error.message);
        }
    }

    // Event listeners for modal
    document.addEventListener('DOMContentLoaded', () => {
        // Open modal buttons
        const openBtns = document.querySelectorAll('.open-modal-btn');
        openBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const fileId = btn.getAttribute('data-file-id');
                openLinkModal(fileId, btn);
            });
        });

        // Set up each modal with its own close button
        const modals = document.querySelectorAll('.modal-overlay');
        modals.forEach(modal => {
            const closeBtn = modal.querySelector('.close-modal-btn');
            if (closeBtn) {
                closeBtn.addEventListener('click', closeLinkModal);
            }

            // Modal overlay close
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeLinkModal();
                }
            });

            // Create link button
            const createBtn = modal.querySelector('.create-link-submit-btn');
            if (createBtn) {
                createBtn.addEventListener('click', createNewLink);
            }
        });
    });
</script>
</body>
</html>
