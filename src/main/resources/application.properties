spring.application.name=file-way

spring.datasource.url=jdbc:postgresql://localhost:5432/filewaydb
spring.datasource.username=admin
spring.datasource.password=admin123
spring.jpa.properties.hibernate.default_schema=fileway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.table=flyway_schema_history

logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB